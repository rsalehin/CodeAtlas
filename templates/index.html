<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeAtlas — Knowledge Graph Explorer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
    }
    .header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header h1 {
      font-size: 22px;
      font-weight: 600;
      background: linear-gradient(135deg, #58a6ff, #3fb950);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header .badge {
      font-size: 11px;
      background: #238636;
      color: white;
      padding: 2px 8px;
      border-radius: 12px;
    }
    .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
    .input-section {
      display: flex; gap: 12px; margin-bottom: 20px;
    }
    .input-section input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #30363d;
      border-radius: 8px;
      background: #0d1117;
      color: #c9d1d9;
      font-size: 15px;
      outline: none;
    }
    .input-section input:focus { border-color: #58a6ff; }
    .input-section input::placeholder { color: #484f58; }
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary { background: #238636; color: white; }
    .btn-primary:hover { background: #2ea043; }
    .btn-primary:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
    .btn-secondary { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; }
    .btn-secondary:hover { background: #30363d; }
    .quick-links { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .quick-links button {
      padding: 6px 14px;
      font-size: 13px;
      border: 1px solid #30363d;
      border-radius: 20px;
      background: #161b22;
      color: #8b949e;
      cursor: pointer;
    }
    .quick-links button:hover { background: #21262d; color: #c9d1d9; }
    .progress-section {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
      max-height: 250px;
      overflow-y: auto;
      display: none;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 13px;
    }
    .progress-section .line { padding: 2px 0; }
    .progress-section .line.highlight { color: #58a6ff; }
    .progress-section .line.success { color: #3fb950; }
    .results-section { display: none; }
    .tabs { display: flex; gap: 0; margin-bottom: 0; }
    .tab {
      padding: 10px 20px;
      border: 1px solid #30363d;
      border-bottom: none;
      background: #161b22;
      color: #8b949e;
      cursor: pointer;
      font-size: 14px;
      border-radius: 8px 8px 0 0;
      margin-right: 4px;
    }
    .tab.active { background: #0d1117; color: #c9d1d9; border-bottom: 2px solid #58a6ff; }
    .tab-content {
      display: none;
      border: 1px solid #30363d;
      border-radius: 0 8px 8px 8px;
      background: #0d1117;
      min-height: 500px;
      overflow: hidden;
    }
    .tab-content.active { display: block; }
    .tab-content iframe {
      width: 100%; height: 600px; border: none;
    }
    .markdown-body {
      padding: 24px;
      max-height: 600px;
      overflow-y: auto;
      line-height: 1.6;
    }
    .markdown-body h1 { font-size: 20px; margin-bottom: 12px; }
    .markdown-body h2 { font-size: 16px; margin: 16px 0 8px; color: #58a6ff; }
    .markdown-body ul { padding-left: 20px; }
    .markdown-body li { margin: 4px 0; }
    .markdown-body table { border-collapse: collapse; width: 100%; margin: 8px 0; }
    .markdown-body th, .markdown-body td { border: 1px solid #30363d; padding: 6px 12px; text-align: left; }
    .markdown-body th { background: #161b22; }
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid #30363d; border-top-color: #58a6ff;
      border-radius: 50%; animation: spin 0.8s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #238636; color: white; padding: 12px 20px;
      border-radius: 8px; font-size: 14px; display: none; z-index: 1000;
    }
  </style>
</head>
<body>

<div class="header">
  <h1>CodeAtlas</h1>
  <span class="badge">v1.0</span>
  <span style="color:#8b949e;font-size:13px;">Knowledge Graph Explorer</span>
</div>

<div class="container">
  <div class="quick-links">
    <button onclick="analyzeTarget('sample_repo')">📦 Sample Project</button>
    <button onclick="analyzeTarget('https://github.com/psf/requests')">🌐 Requests (Python)</button>
    <button onclick="analyzeTarget('https://github.com/expressjs/express')">🌐 Express (JS)</button>
  </div>

  <div class="input-section">
    <input type="text" id="targetInput" placeholder="Paste a GitHub URL or local path... (e.g., https://github.com/user/repo)">
    <button class="btn btn-primary" id="analyzeBtn" onclick="analyzeTarget()">
      <span id="btnText">Analyze</span>
    </button>
  </div>

  <div class="progress-section" id="progress">
    <div class="line highlight"><span class="spinner"></span> Starting pipeline...</div>
  </div>

  <div class="results-section" id="results">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('graph')">📊 Graph</button>
      <button class="tab" onclick="switchTab('report')">📝 Report</button>
      <button class="tab" onclick="switchTab('communities')">🔗 Communities</button>
      <button class="tab" onclick="switchTab('json')">📋 JSON</button>
    </div>
    <div class="tab-content active" id="tab-graph">
      <iframe id="graphFrame" src="about:blank"></iframe>
    </div>
    <div class="tab-content" id="tab-report">
      <div class="markdown-body" id="reportContent"></div>
    </div>
    <div class="tab-content" id="tab-communities">
      <div class="markdown-body" id="communitiesContent"></div>
    </div>
    <div class="tab-content" id="tab-json">
      <div class="markdown-body" id="jsonContent" style="white-space:pre-wrap;font-family:monospace;font-size:13px;"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let currentTask = null;
let eventSource = null;

function analyzeTarget(target) {
  if (!target) {
    target = document.getElementById('targetInput').value.trim();
  } else {
    document.getElementById('targetInput').value = target;
  }
  if (!target) return;

  const btn = document.getElementById('analyzeBtn');
  const btnText = document.getElementById('btnText');
  btn.disabled = true;
  btnText.innerHTML = '<span class="spinner"></span> Running...';

  document.getElementById('progress').style.display = 'block';
  document.getElementById('progress').innerHTML = '<div class="line highlight"><span class="spinner"></span> Starting...</div>';
  document.getElementById('results').style.display = 'none';

  // Close any existing SSE
  if (eventSource) eventSource.close();

  fetch('/analyze', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ target: target })
  })
  .then(r => r.json())
  .then(data => {
    if (data.error) {
      showToast('Error: ' + data.error, true);
      resetButton();
      return;
    }
    currentTask = data.task_id;
    startStream(currentTask);
  })
  .catch(err => {
    showToast('Failed to start: ' + err, true);
    resetButton();
  });
}

function startStream(taskId) {
  eventSource = new EventSource('/stream/' + taskId);
  const progressDiv = document.getElementById('progress');

  eventSource.onmessage = function(event) {
    const msg = event.data;

    if (msg.startsWith('__DONE__:')) {
      const outputPath = msg.replace('__DONE__:', '');
      progressDiv.innerHTML += '<div class="line success">✓ Pipeline complete!</div>';
      eventSource.close();
      resetButton();
      showResults(taskId);
      showToast('Analysis complete!');
      return;
    }

    if (msg.startsWith('__ERROR__:')) {
      const err = msg.replace('__ERROR__:', '');
      progressDiv.innerHTML += `<div class="line" style="color:#f85149;">✗ Error: ${err}</div>`;
      eventSource.close();
      resetButton();
      showToast('Error: ' + err, true);
      return;
    }

    if (msg === '__KEEPALIVE__') return;

    // Determine line style
    let cssClass = '';
    if (msg.startsWith('AST:')) cssClass = '';
    else if (msg.includes('community') || msg.includes('Community')) cssClass = 'success';
    else if (msg.includes('God node') || msg.includes('complete')) cssClass = 'highlight';
    else if (msg.includes('found') || msg.includes('Found')) cssClass = 'highlight';

    progressDiv.innerHTML += `<div class="line ${cssClass}">  ${escapeHtml(msg)}</div>`;
    progressDiv.scrollTop = progressDiv.scrollHeight;
  };

  eventSource.onerror = function() {
    eventSource.close();
  };
}

function showResults(taskId) {
  document.getElementById('results').style.display = 'block';
  document.getElementById('graphFrame').src = '/graph/' + taskId;

  fetch('/report/' + taskId)
    .then(r => r.text())
    .then(md => {
      document.getElementById('reportContent').innerHTML = parseMarkdown(md);
    });

  fetch('/communities/' + taskId)
    .then(r => r.json())
    .then(data => {
      let html = '<h2>Communities</h2><table><tr><th>ID</th><th>Size</th><th>Members</th></tr>';
      for (const [id, members] of Object.entries(data)) {
        html += `<tr><td>${id}</td><td>${members.length}</td><td>${members.slice(0, 5).join(', ')}${members.length > 5 ? '...' : ''}</td></tr>`;
      }
      html += '</table>';
      document.getElementById('communitiesContent').innerHTML = html;
    });

  fetch('/output/' + taskId + '/output/graph.json')
    .then(r => r.json())
    .then(data => {
      document.getElementById('jsonContent').textContent = JSON.stringify(data, null, 2);
    });
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

function resetButton() {
  const btn = document.getElementById('analyzeBtn');
  btn.disabled = false;
  document.getElementById('btnText').textContent = 'Analyze';
}

function showToast(msg, isError = false) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.style.background = isError ? '#da3633' : '#238636';
  toast.style.display = 'block';
  setTimeout(() => { toast.style.display = 'none'; }, 3000);
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// Bare-bones markdown parser for the report
function parseMarkdown(md) {
  let html = md;
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
  html = html.replace(/\|(.+)\|/g, (match) => {
    const cells = match.split('|').filter(c => c.trim());
    if (cells.every(c => c.trim().match(/^[-:]+$/))) return '';
    const tag = match.includes('---') ? '' : 'td';
    return '<tr>' + cells.map(c => `<${tag}>${c.trim()}</${tag}>`).join('') + '</tr>';
  });
  html = html.replace(/(<tr>.*<\/tr>\n?)+/g, '<table>$&</table>');
  html = html.replace(/\n/g, '<br>');
  return html;
}

// Allow Enter key to submit
document.getElementById('targetInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') analyzeTarget();
});
</script>
</body>
</html>
